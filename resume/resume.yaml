cv:
  name: "Ziad Aboughaleb"
  headline: "Full-Stack Web Developer"
  location: "Shebin El-Kom, Menoufia, Egypt"
  email: "ziadahmed2371@gmail.com"
  phone: "+201003460524"
  website: https://ziad-wdev.vercel.app
  social_networks:
    - network: GitHub
      username: ziad-wdev
    - network: LinkedIn
      username: ziad-wdev
  custom_connections: []

  sections:
    summary:
      - >
        Driving full-stack web solutions as a **MERN** and **Next.js** developer, implementing responsive UIs and optimized builds that reduce bundle sizes and enhance rendering efficiency. Leverage **TypeScript**, **Tailwind CSS**, and **REST APIs** to ship scalable, high-performance web applications with measurable gains in speed and usability.

    education:
      - institution: "SEF Academy"
        area: "Full Stack Web Development"
        start_date: 2025-11
        end_date: 2026-04
        highlights:
          - "Front-end Web Development Degree: **98.92%**"
      - institution: "Faculty of Electronic Engineering, Menoufia University"
        area: "Electrical, Electronics, and Communications Engineering"
        start_date: 2023-10
        end_date: present
        highlights:
          - "**Relevant Coursework:** Data Structures & Algorithms, Digital Logic."

    skills:
      - label: Front-end
        details: HTML, CSS, JS, React.js, Next.js, TypeScript, Tailwind CSS
      - label: Back-end
        details: Node.js, Express, MongoDB
      - label: Tools
        details: Git, GitHub, Vercel

    projects:
      - name: DigitalPro -- Marketing Agency Landing Page
        start_date: 2026-03
        end_date: 2026-03
        summary: "**Links:** [GitHub Repo](https://github.com/ziad-wdev/DigitalPro) | [Live Demo](https://ziad-wdev.github.io/DigitalPro/)"
        highlights:
          - Engineered a responsive single-page marketing website using **React 19, Tailwind CSS v4, and Vite** to present services, team members, and business metrics.
          - Implemented **smooth-scroll navigation, sticky header, and interactive UI animations** to enhance user experience and accessibility across devices.
          - Structured modular, reusable components and optimized build performance with **Vite**, improving load speed and maintainability.

      - name: ziad.dev -- Personal Portfolio
        start_date: 2026-04
        end_date: 2026-04
        summary: "**Links:** [GitHub Repo](https://github.com/ziad-wdev/portfolio) | [Live Demo](https://ziad-wdev.vercel.app/)"
        highlights:
          - Engineered a fully responsive portfolio using **React 19 and Vite 8**, integrating dynamic project data via **GitHub API and Microlink API** to eliminate manual updates.
          - Developed a production-ready contact system using **EmailJS and TanStack Form** with client-side validation and real-time feedback via **Sonner notifications**.
          - Developed persistent **dark/light theme support** using localStorage and optimized UI performance with the **React Compiler**, improving rendering efficiency.

design:
  theme: engineeringresumes
  page:
    size: a4
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: false
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: justified-with-no-hyphenation
    date_and_location_column_alignment: right
    font_family:
      body: Roboto
      name: Roboto
      headline: Roboto
      connections: Roboto
      section_titles: Roboto
    font_size:
      body: 10pt
      name: 24pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.25em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: international
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.5cm
  section_titles:
    type: with_partial_line
    line_thickness: 1pt
    space_above: 0.5cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: false
    degree_width: 1cm
    summary:
      space_above: 0.12cm
      space_left: 0cm
    highlights:
      bullet: ●
      nested_bullet: ●
      space_left: 0cm
      space_above: 0.12cm
      space_between_items: 0.12cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED CURRENT_DATE*"
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE -- END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    education_entry:
      main_column: |-
        **INSTITUTION** -- LOCATION
        DEGREE_WITH_AREA
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **COMPANY** -- LOCATION
        POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE

settings:
  render_command:
